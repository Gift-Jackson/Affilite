<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="logo2.png" type="image/x-icon">

    <style>
        .success-container{
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .success-logo{
            height: 200px;
            width: 200px;
            margin: auto;
        }
        .success-main{
            text-align: center;
        }
        .success-logo img{
            width: 100%;
        }
        .success-content{
            margin-top: 10px;
        }
        .btn-6{
            margin-top: 40px;
            height: 50px;
            width: 200px;
            background-color: transparent;
            border: 1px solid #05ce81;
            color: #05ce81;
            border-radius: 50px;
            font-size: 17px;
        }
        .btn-6:hover{
            background-color: #05ce81;
            color: #fefefe;
        }
        .btn-6:active{
            transform: scale(0.9);
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="success-container">
            <div class="success-main">
                <div class="success-logo">
                    <img src="logo2.png" alt="Affilite_logo">
                </div>
                <div class="success-title">
                    <h2>Thank you for <span class="mark">contacting</span> us!</h2>
                </div>
                <div class="success-content">
                    <p>We have received your query, we will reachout to you shortly.</p>
                </div>
                <div class="success btn">
                    <a href="index.html">
                        <button class="btn btn-6">Go back to home</button>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
