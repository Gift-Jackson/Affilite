<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affilite</title>
    <!-- stylesheet link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <!-- Companylogo -->
        <div class="logo">
            <img src="logo2.png" alt="Affilite logo" srcset="">
        </div>

        <!-- navigators -->
        <nav>
            <ul>
                <li>
                    <a  class="current"  href="#">Home</a>
                </li>
                <li>
                    <a href="#">About</a>
                </li>
                <li>
                    <a href="#">Services</a>
                </li>
                <li>
                    <a href="#">FAQ</a>
                </li>
                <li>
                    <a href="#">Contacts</a>
                </li>
            </ul>
        </nav>

        <!-- toggle menu -->
        <div class="toggle-box">
            <div class="toggle"></div>
        </div>
    </header>

    <!-- Hero section -->
    <section id="Hero">
        <div class="wrapper">
            <div class="wrap">
                <div class="brand">
                    <h1>Affilite</h1>
                </div>
                <div class="slogan">
                    <p>learn. earn. promote</p>
                </div>
                <p class="text-2">Lorem ipsum dolor sit amet consectetur adipisicing elit. Veniam harum veritatis, dolorem sapiente et laborum.</p>

                <!-- action button -->
                <div class="action-buttons">
                    <button class="btn btn-1">Get Started</button>
                    <button class="btn btn-2">Learn More!</button>
                </div>
            </div>
            <div class="wrap">
                <img src="mello.svg" alt="" srcset="">
            </div>
        </div>
    </section>

    <!-- script -->
    <script src="main.js"></script>
</body>
</html>
